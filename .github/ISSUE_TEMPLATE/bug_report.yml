name: "Bug Report"
description: "Report a bug"
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "## Bug Report"
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "What happened?"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
  - type: input
    id: version
    attributes:
      label: "App Version"
      placeholder: "v0.1.0"
  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
